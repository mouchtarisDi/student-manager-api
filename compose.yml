services:
  app:
    build: .
    container_name: student_center_api
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    depends_on:
      - db
    volumes:
      - .:/app

  db:
    image: postgres:16
    container_name: student_center_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: student_center_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d student_center_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: