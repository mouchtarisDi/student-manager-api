[tool.black]
line-length = 88
target-version = ["py312"]
exclude = '''
/(
    \.git
  | \.venv
  | __pycache__
  | \.pytest_cache
)/
'''

[tool.ruff]
line-length = 88
target-version = "py312"
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    ".pytest_cache",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
